services:
  php:
    build:
      context: .
      target: dev
    volumes:
      - ./:/var/www/html:cached
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/php.dev.ini:ro
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-f8a2f8cfadc58ce257e07b70472e527c}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
      MAILER_DSN: smtp://mailer:1025
      XDEBUG_MODE: debug,coverage
      PHP_IDE_CONFIG: serverName=eboutique
    ports:
      - "9003:9003"

  nginx:
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html:ro

###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "5435:5432"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###
