name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    test:
        name: PHP ${{ matrix.php-version }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php-version: ['8.3']

        services:
            database:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: app_test
                    POSTGRES_USER: app
                    POSTGRES_PASSWORD: "!ChangeMe!"
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=3

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP ${{ matrix.php-version }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}
                  extensions: ctype, iconv, mbstring, intl, pdo_pgsql
                  coverage: xdebug
                  tools: phpunit

            - name: Install Composer dependencies
              uses: ramsey/composer-install@v3
              with:
                  composer-options: "--no-progress --prefer-dist"

            - name: Run PHPUnit tests
              run: php vendor/phpunit/phpunit/phpunit --colors=always --testdox
              env:
                  APP_ENV: test
                  DATABASE_URL: "postgresql://app:!ChangeMe!@127.0.0.1:5432/app_test?serverVersion=16&charset=utf8"
